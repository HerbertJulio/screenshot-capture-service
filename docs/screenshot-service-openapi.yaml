openapi: 3.1.0
info:
  title: Screenshot Capture Service (SCS)
  description: |
    SCS standalone service for automatic screenshot capture of published URLs
    via headless browser. Generates preview images for templates, applications, and deployments.
  version: 1.0.0
  contact:
    name: SCS Engineering
    url: https://www.example.com

servers:
  - url: https://screenshots-api.example.com/v1
    description: Production
  - url: https://screenshots-api-stage.example.com/v1
    description: Staging
  - url: http://localhost:3000/v1
    description: Local development

tags:
  - name: Captures
    description: Submission and querying of screenshot capture jobs
  - name: Entities
    description: Querying and management of screenshots by entity
  - name: Events
    description: Webhook receiver for internal events
  - name: Health
    description: Health checks and metrics

security:
  - ApiKeyAuth: []

paths:
  /captures:
    post:
      tags: [Captures]
      summary: Submit capture job
      description: |
        Creates a new screenshot capture job for the provided URL.
        If a `queued` or `running` job already exists for the same entity, returns the existing job (deduplication).
      operationId: createCapture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaptureRequest'
            examples:
              template:
                summary: Template capture
                value:
                  url: "https://example-template.example.app"
                  entity_type: "template"
                  entity_id: "sol-12345"
                  options:
                    viewports: ["card"]
                    wait_strategy: "networkidle"
                    delay_after_load_ms: 2000
              templateWithCallback:
                summary: Capture with callback
                value:
                  url: "https://example-template.example.app"
                  entity_type: "template"
                  entity_id: "sol-12345"
                  callback_url: "https://api.example.com/internal/webhooks/screenshot-ready"
                  options:
                    viewports: ["card", "detail"]
                    wait_strategy: "networkidle"
                    wait_selector: "#app"
                    wait_timeout_ms: 15000
                    delay_after_load_ms: 2000
              application:
                summary: Application capture (future)
                value:
                  url: "https://my-app.example.app"
                  entity_type: "application"
                  entity_id: "app-67890"
      responses:
        '202':
          description: Job created and enqueued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCaptureResponse'
              example:
                job_id: "job_abc123"
                status: "queued"
                created_at: "2026-03-16T10:00:00Z"
                estimated_completion_seconds: 30
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: URL not allowed (outside the allowlist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "url_not_allowed"
                message: "The provided URL is not in the allowlist. Only *.example.app and *.example.net domains are allowed."
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /captures/bulk:
    post:
      tags: [Captures]
      summary: Submit bulk captures
      description: |
        Creates multiple capture jobs in a single request. Useful for initial backfill
        of all existing templates. Maximum of 100 items per request.
      operationId: createBulkCapture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCaptureRequest'
            example:
              items:
                - url: "https://t1.example.app"
                  entity_type: "template"
                  entity_id: "sol-001"
                - url: "https://t2.example.app"
                  entity_type: "template"
                  entity_id: "sol-002"
              priority: "low"
      responses:
        '202':
          description: Batch enqueued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCaptureResponse'
              example:
                batch_id: "batch_xyz"
                total_jobs: 2
                status: "queued"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /captures/{job_id}:
    get:
      tags: [Captures]
      summary: Query job status
      description: |
        Returns the current job status and, if completed successfully, the generated screenshots.
        Clients can poll this endpoint while the status is `queued` or `running`.
      operationId: getCapture
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureStatus'
              examples:
                queued:
                  summary: Job in queue
                  value:
                    job_id: "job_abc123"
                    status: "queued"
                    url: "https://example-template.example.app"
                    entity_type: "template"
                    entity_id: "sol-12345"
                    attempts: 0
                    created_at: "2026-03-16T10:00:00Z"
                    started_at: null
                    completed_at: null
                    results: []
                succeeded:
                  summary: Capture completed
                  value:
                    job_id: "job_abc123"
                    status: "succeeded"
                    url: "https://example-template.example.app"
                    entity_type: "template"
                    entity_id: "sol-12345"
                    attempts: 1
                    created_at: "2026-03-16T10:00:00Z"
                    started_at: "2026-03-16T10:00:01Z"
                    completed_at: "2026-03-16T10:00:12Z"
                    results:
                      - viewport: "card"
                        width: 400
                        height: 300
                        format: "webp"
                        image_url: "https://screenshots.example.com/template/sol-12345/card-400x300-v1710583212.webp"
                        file_size_bytes: 24576
                      - viewport: "detail"
                        width: 1280
                        height: 800
                        format: "webp"
                        image_url: "https://screenshots.example.com/template/sol-12345/detail-1280x800-v1710583212.webp"
                        file_size_bytes: 89120
                failed:
                  summary: Capture failed
                  value:
                    job_id: "job_abc123"
                    status: "failed"
                    url: "https://example-template.example.app"
                    entity_type: "template"
                    entity_id: "sol-12345"
                    attempts: 3
                    created_at: "2026-03-16T10:00:00Z"
                    started_at: "2026-03-16T10:00:01Z"
                    completed_at: "2026-03-16T10:01:30Z"
                    error:
                      code: "blank_page"
                      message: "Screenshot detected as blank after 3 attempts with escalated wait strategies"
                    results: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /entities/{entity_type}/{entity_id}/screenshots:
    get:
      tags: [Entities]
      summary: List screenshots for an entity
      description: |
        Returns the most recent screenshots (is_latest=true) for a specific entity.
        If no screenshots exist, returns an empty list.
      operationId: getEntityScreenshots
      parameters:
        - $ref: '#/components/parameters/EntityType'
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Entity screenshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityScreenshots'
              examples:
                withScreenshots:
                  summary: Entity with screenshots
                  value:
                    entity_type: "template"
                    entity_id: "sol-12345"
                    latest_capture_at: "2026-03-16T10:00:12Z"
                    screenshots:
                      - viewport: "card"
                        image_url: "https://screenshots.example.com/template/sol-12345/card-400x300-v1710583212.webp"
                        width: 400
                        height: 300
                        format: "webp"
                      - viewport: "detail"
                        image_url: "https://screenshots.example.com/template/sol-12345/detail-1280x800-v1710583212.webp"
                        width: 1280
                        height: 800
                        format: "webp"
                empty:
                  summary: Entity without screenshots
                  value:
                    entity_type: "template"
                    entity_id: "sol-99999"
                    latest_capture_at: null
                    screenshots: []
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Entities]
      summary: Remove screenshots for an entity
      description: |
        Removes all screenshots for an entity from storage and the database.
        This operation is irreversible.
      operationId: deleteEntityScreenshots
      parameters:
        - $ref: '#/components/parameters/EntityType'
        - $ref: '#/components/parameters/EntityId'
      responses:
        '204':
          description: Screenshots removed successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events:
    post:
      tags: [Events]
      summary: Receive internal event (webhook)
      description: |
        Endpoint to receive events from SCS internal systems (e.g., Marketplace API, Deploy Pipeline).
        Authentication via HMAC-SHA256 in the X-Webhook-Signature header.
      operationId: receiveEvent
      security:
        - WebhookSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEvent'
            examples:
              templatePublished:
                summary: Template published
                value:
                  event_type: "template.published"
                  entity_type: "template"
                  entity_id: "sol-12345"
                  url: "https://updated-template.example.app"
                  timestamp: "2026-03-16T10:00:00Z"
              templateUpdated:
                summary: Template updated
                value:
                  event_type: "template.updated"
                  entity_type: "template"
                  entity_id: "sol-12345"
                  url: "https://updated-template.example.app"
                  timestamp: "2026-03-16T11:30:00Z"
              deploymentFinished:
                summary: Deployment finished (future)
                value:
                  event_type: "deployment.finished"
                  entity_type: "deployment"
                  entity_id: "deploy-11111"
                  url: "https://my-app.example.app"
                  timestamp: "2026-03-16T14:00:00Z"
      responses:
        '202':
          description: Event received and capture enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCaptureResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      description: Returns 200 if the API is up
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      description: Returns 200 if API, database, and queue are connected
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: All dependencies ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  db:
                    type: string
                    example: "connected"
                  queue:
                    type: string
                    example: "connected"
        '503':
          description: One or more dependencies unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "degraded"
                  db:
                    type: string
                    example: "disconnected"
                  queue:
                    type: string
                    example: "connected"

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      description: Returns metrics in Prometheus text exposition format
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Metrics in Prometheus format
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API key for external client authentication
    WebhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: HMAC-SHA256 signature for internal webhooks

  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      description: Unique identifier of the capture job
      schema:
        type: string
        format: uuid
        example: "job_abc123"

    EntityType:
      name: entity_type
      in: path
      required: true
      description: Entity type
      schema:
        type: string
        enum: [template, application, deployment]
        example: "template"

    EntityId:
      name: entity_id
      in: path
      required: true
      description: Entity ID in the source system
      schema:
        type: string
        example: "sol-12345"

  schemas:
    CreateCaptureRequest:
      type: object
      required: [url, entity_type, entity_id]
      properties:
        url:
          type: string
          format: uri
          description: URL to capture. Must be HTTPS and in the allowlist.
          example: "https://example-template.example.app"
        entity_type:
          type: string
          enum: [template, application, deployment]
          description: Entity type
          example: "template"
        entity_id:
          type: string
          description: Entity ID in the source system
          example: "sol-12345"
        callback_url:
          type: string
          format: uri
          description: URL for POST with result after capture (optional)
          example: "https://api.example.com/internal/webhooks/screenshot-ready"
        options:
          $ref: '#/components/schemas/CaptureOptions'

    CaptureOptions:
      type: object
      properties:
        viewports:
          type: array
          items:
            type: string
            enum: [card, detail, og]
          default: ["card"]
          description: Viewports to capture
          example: ["card", "detail"]
        wait_strategy:
          type: string
          enum: [networkidle, domcontentloaded, load]
          default: "networkidle"
          description: Wait strategy before capture
        wait_selector:
          type: string
          description: CSS selector to wait for before capturing
          example: "#app"
        wait_timeout_ms:
          type: integer
          minimum: 1000
          maximum: 60000
          default: 15000
          description: Timeout for wait strategy (ms)
        delay_after_load_ms:
          type: integer
          minimum: 0
          maximum: 10000
          default: 2000
          description: Additional delay after load event (ms)

    CreateCaptureResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
          description: Unique identifier of the created job
        status:
          type: string
          enum: [queued]
          description: Initial job status
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        estimated_completion_seconds:
          type: integer
          description: Estimated time until completion (seconds)

    CaptureStatus:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, processing_images, succeeded, failed, cancelled]
          description: |
            Job status:
            - `queued`: In queue, waiting for worker
            - `running`: Worker executing capture
            - `processing_images`: Capture ok, processing images
            - `succeeded`: Images ready via CDN
            - `failed`: Failed after all retries
            - `cancelled`: Manually cancelled
        url:
          type: string
          format: uri
        entity_type:
          type: string
          enum: [template, application, deployment]
        entity_id:
          type: string
        attempts:
          type: integer
          description: Number of attempts performed
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error:
          $ref: '#/components/schemas/CaptureError'
        results:
          type: array
          items:
            $ref: '#/components/schemas/ScreenshotResult'

    CaptureError:
      type: object
      nullable: true
      properties:
        code:
          type: string
          enum:
            - timeout
            - dns_failure
            - connection_refused
            - blank_page
            - ssl_error
            - http_4xx
            - http_5xx
            - browser_crash
            - blocked_by_firewall
            - url_not_allowed
            - internal_error
          description: Error code
        message:
          type: string
          description: Descriptive error message

    ScreenshotResult:
      type: object
      properties:
        viewport:
          type: string
          enum: [card, detail, og]
          description: Captured viewport
        width:
          type: integer
          description: Width in pixels
        height:
          type: integer
          description: Height in pixels
        format:
          type: string
          enum: [webp, png, avif]
          description: Image format
        image_url:
          type: string
          format: uri
          description: Public image URL via CDN
        file_size_bytes:
          type: integer
          description: File size in bytes

    EntityScreenshots:
      type: object
      properties:
        entity_type:
          type: string
          enum: [template, application, deployment]
        entity_id:
          type: string
        latest_capture_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent capture
        screenshots:
          type: array
          items:
            $ref: '#/components/schemas/ScreenshotResult'

    BulkCaptureRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [url, entity_type, entity_id]
            properties:
              url:
                type: string
                format: uri
              entity_type:
                type: string
                enum: [template, application, deployment]
              entity_id:
                type: string
          description: List of captures to process (max. 100)
        priority:
          type: string
          enum: [high, low]
          default: "high"
          description: Queue priority (low for backfill)

    BulkCaptureResponse:
      type: object
      properties:
        batch_id:
          type: string
          format: uuid
          description: Batch identifier
        total_jobs:
          type: integer
          description: Number of jobs created
        status:
          type: string
          enum: [queued]

    WebhookEvent:
      type: object
      required: [event_type, entity_type, entity_id, url]
      properties:
        event_type:
          type: string
          enum:
            - template.published
            - template.updated
            - deployment.finished
            - manual.trigger
          description: Event type
        entity_type:
          type: string
          enum: [template, application, deployment]
        entity_id:
          type: string
        url:
          type: string
          format: uri
          description: URL to capture
        timestamp:
          type: string
          format: date-time
          description: Event timestamp in the source system

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Descriptive message

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "validation_error"
            message: "url is required and must be a valid HTTPS URL"

    Unauthorized:
      description: Invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "unauthorized"
            message: "Invalid or missing API key"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "not_found"
            message: "Job not found"

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "rate_limit_exceeded"
            message: "Too many requests. Please retry after 60 seconds."
