services:
  scs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - API_KEY=${API_KEY:-dev-api-key}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev-webhook-secret}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://localstack:4566}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-scs-screenshots}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-test}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-test}
      - CDN_BASE_URL=${CDN_BASE_URL:-http://localhost:4566/scs-screenshots}
      - DB_PATH=/app/data/scs.db
    volumes:
      - scs-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # Local S3 for development
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  scs-data:
  localstack-data:
